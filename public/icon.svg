<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7c3aed"/>
      <stop offset="0.5" stop-color="#c026d3"/>
      <stop offset="1" stop-color="#14b8a6"/>
    </linearGradient>
    <linearGradient id="mark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#f5f0ff"/>
    </linearGradient>
    <filter id="blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="22"/>
    </filter>
  </defs>
  <rect width="512" height="512" rx="112" fill="#1a1426"/>
  <g opacity="0.55" filter="url(#blur)">
    <circle cx="150" cy="160" r="120" fill="#7c3aed"/>
    <circle cx="370" cy="180" r="110" fill="#c026d3"/>
    <circle cx="360" cy="370" r="120" fill="#14b8a6"/>
    <circle cx="150" cy="380" r="110" fill="#10b981"/>
  </g>
  <rect width="512" height="512" rx="112" fill="url(#bg)" opacity="0.14"/>
  <!-- A stylisé en flèche d'arbitrage (achat -> vente) -->
  <g transform="translate(256 256)">
    <circle r="132" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.2)" stroke-width="1.5"/>
    <path d="M -70 18 L 70 18 L 70 38 L 110 0 L 70 -38 L 70 -18 L -70 -18 Z" fill="url(#mark)"/>
    <circle cx="-70" cy="0" r="20" fill="#5eead4"/>
    <circle cx="110" cy="0" r="20" fill="#f0abfc"/>
    <text x="0" y="84" text-anchor="middle" font-family="Sora, system-ui, sans-serif" font-size="44" font-weight="800" fill="url(#mark)">ArbiTech</text>
  </g>
</svg>
